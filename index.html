<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메종드아이디헤어 체크인</title>
<style>
  :root { --accent: #B8966E; --bg-gold: #F0E6D6; --gray: #E2E2DD; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #FAFAF8; padding: 20px; }
  .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
  .page { display: none; } .page.active { display: block; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
  
  /* 디자인: 선택 시 골드 베이지 & 굵은 테두리 강조 */
  .card { border: 2px solid var(--gray); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.2s; }
  .card.active { border: 3px solid var(--accent) !important; background-color: var(--bg-gold) !important; font-weight: bold; }
  
  button { width: 100%; padding: 15px; background: #000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
</style>
</head>
<body>

<div class="container">
  <div id="step1" class="page active">
    <h2>1. 방문 정보</h2>
    <input type="text" id="name" placeholder="성함">
    <input type="tel" id="phone" placeholder="연락처">
    <button onclick="next(2)">다음</button>
  </div>

  <div id="step2" class="page">
    <h2>2. 맞춤 서비스</h2>
    <p>담당 디자이너</p>
    <div class="grid" id="desList">
      <div class="card" onclick="select(this)">보배</div>
      <div class="card" onclick="select(this)">청아</div>
    </div>
    <p>맞춤 케어</p>
    <div class="grid">
      <div class="card" onclick="select(this)">🤫 조용히 시술 희망</div>
      <div class="card" onclick="select(this)">📋 시술 설명 필요</div>
    </div>
    <button onclick="finish()">체크인 완료 및 알림 발송</button>
  </div>
</div>

<script>
  function next(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
  }
  
  function select(el) {
    // 디자이너 카드인 경우 기존 선택 해제
    if(el.parentElement.id === 'desList') {
      document.querySelectorAll('#desList .card').forEach(c => c.classList.remove('active'));
    }
    el.classList.toggle('active');
  }

  function finish() {
    alert("체크인이 완료되었습니다. 슬랙 알림을 발송합니다.");
    location.reload();
  }
</script>
</body>
</html>
