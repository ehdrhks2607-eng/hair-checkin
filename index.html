<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메종드아이디헤어</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #fff; }
        .header { padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 16px; font-weight: 700; }
        .btns button { padding: 6px 14px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 6px; font-family: 'Noto Sans KR', sans-serif; transition: all .2s; }
        .btns button.on { background: #000; color: #fff; border-color: #000; }
        .page { display: none; max-width: 600px; margin: 0 auto; padding: 20px; }
        .page.on { display: block; }
        .welcome { position: fixed; inset: 0; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; text-align: center; }
        .welcome.hidden { display: none; }
        .w-text { max-width: 350px; }
        .w-brand { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
        .w-branch { font-size: 10px; color: rgba(255,255,255,.5); margin-bottom: 20px; }
        .w-msg { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .w-desc { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,.7); margin-bottom: 32px; }
        .w-btn { background: #B8966E; color: #fff; border: none; padding: 12px 36px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
        .steps { display: flex; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #eee; }
        .step { flex: 1; text-align: center; position: relative; }
        .step:not(:last-child)::after { content: ''; position: absolute; top: 10px; left: 50%; width: 100%; height: 2px; background: #eee; z-index: 0; }
        .step.done:not(:last-child)::after { background: #B8966E; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd; background: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-size: 9px; font-weight: 600; position: relative; z-index: 1; transition: all .2s; }
        .step.on .dot, .step.done .dot { border-color: #B8966E; background: #B8966E; color: #fff; }
        .screen { display: none; }
        .screen.on { display: block; }
        .screen h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .screen p { font-size: 12px; color: #666; margin-bottom: 14px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .field input, .field textarea, .field select { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
        .field input:focus { border-color: #B8966E; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
        .card { border: 1.5px solid #ddd; border-radius: 6px; padding: 12px 6px; text-align: center; cursor: pointer; transition: all .2s; }
        .card.on { border-color: #B8966E; background: #B8966E; color: #fff; }
        .check-box { display: flex; align-items: center; gap: 8px; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
        .btn { padding: 11px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-primary { background: #000; color: #fff; }
        .btn-ghost { background: #fff; border: 1.5px solid #ddd; color: #000; }
        .summary { background: #f9f9f9; border-radius: 6px; padding: 12px; margin-bottom: 14px; }
        .sum-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; }
        .alert { padding: 8px; border-radius: 6px; font-size: 10px; margin-bottom: 8px; background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
        .admin-tab { padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 600; color: #999; }
        .admin-tab.on { color: #000; border-bottom: 2px solid #000; }
        .admin-panel { display: none; }
        .admin-panel.on { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
        .modal.on { display: flex; }
        .mbox { background: #fff; border-radius: 8px; padding: 18px; width: 100%; max-width: 420px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">메종드아이디헤어</div>
        <div class="btns">
            <button class="checkin-btn on" onclick="goPage('checkin')">체크인</button>
            <button class="admin-btn" onclick="checkAdmin()">관리자</button>
        </div>
    </div>

    <div class="welcome on" id="welcome">
        <div class="w-text">
            <div class="w-brand">메종드아이디헤어</div>
            <div class="w-branch">반포자이점</div>
            <div class="w-msg">환영합니다 🙏</div>
            <div class="w-desc">방문해 주셔서 감사합니다. 편하신 서비스를 위해 체크인 부탁드립니다.</div>
            <button class="w-btn" onclick="startCheck()">체크인 시작</button>
        </div>
    </div>

    <div class="page on" id="cPage">
        <div class="steps" id="steps" style="display:none">
            <div class="step on"><div class="dot">1</div></div>
            <div class="step"><div class="dot">2</div></div>
            <div class="step"><div class="dot">3</div></div>
            <div class="step"><div class="dot">4</div></div>
            <div class="step"><div class="dot">5</div></div>
        </div>

        <div class="screen on" id="s1">
            <h2>고객 정보</h2>
            <p>성함과 전화번호를 입력해 주세요.</p>
            <div class="field"><label>성함</label><input type="text" id="name"/></div>
            <div class="field"><label>전화</label><input type="tel" id="phone"/></div>
            <button class="btn btn-primary" onclick="goS(2)">다음</button>
        </div>

        <div class="screen" id="s2">
            <h2>담당 선생님 ✂️</h2>
            <p>선택해 주세요.</p>
            <div class="grid" id="desGrid"></div>
            <button class="btn btn-ghost" onclick="goS(1)">← 이전</button>
        </div>

        <div class="screen" id="s3">
            <h2>음료 ☕</h2>
            <p>선택해 주세요.</p>
            <div class="grid" id="drkGrid"></div>
            <div id="tempWrap" style="display:none">
                <p style="margin-top:12px;margin-bottom:8px;font-size:12px;color:#666">온도</p>
                <div class="grid" id="tempGrid"></div>
            </div>
            <button class="btn btn-primary" id="drkBtn" style="display:none" onclick="goS(4)">다음</button>
            <button class="btn btn-ghost" onclick="goS(2)">← 이전</button>
        </div>

        <div class="screen" id="s4">
            <h2>추가 요청</h2>
            <p>선택해 주세요.</p>
            <div class="check" id="reqCheck"></div>
            <div class="field"><label>기타</label><textarea id="otherReq" style="resize:none;height:65px"></textarea></div>
            <button class="btn btn-primary" onclick="goS(5)">다음</button>
            <button class="btn btn-ghost" onclick="goS(3)">← 이전</button>
        </div>

        <div class="screen" id="s5">
            <h2>확인</h2>
            <p>내용을 확인하세요.</p>
            <div class="summary" id="sum"></div>
            <button class="btn btn-primary" onclick="doCheck()">✓ 완료</button>
            <button class="btn btn-ghost" onclick="goS(4)">← 이전</button>
        </div>

        <div class="screen" id="s6">
            <div class="success" style="text-align:center; padding:20px;">
                <div style="font-size:40px;">✓</div>
                <h2>완료!</h2>
                <p>잠시만 기다려 주세요 😊</p>
                <div class="summary" id="sum2"></div>
                <div id="slackAlert" class="alert" style="display:none">📨 담당 선생님에게 알림을 보냈습니다!</div>
                <p>잠시 후 <span id="cntDown">15</span>초 뒤 시작 화면으로 돌아갑니다.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkl-68aIrcGHpwRUC81xrx51uh4Kq6IPo",
            authDomain: "hair-checkin.firebaseapp.com",
            projectId: "hair-checkin",
            storageBucket: "hair-checkin.firebasestorage.app",
            messagingSenderId: "718954098977",
            appId: "1:718954098977:web:ff79a39feb1288e3e54e60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const dataRef = doc(db, "hairCheckin", "data");

        let data = { designers: [], drinks: [], reservations: [], slackUrl: "", adminPass: "1234", nextId: 1 };
        let ci = { name: "", phone: "", desId: null, drink: "", temp: "", quiet: false, explain: false, req: "" };

        const save = async () => {
            try { await setDoc(dataRef, data); } catch (e) { console.error(e); }
        };

        const load = async () => {
            const docSnap = await getDoc(dataRef);
            if (docSnap.exists()) {
                data = docSnap.data();
                render();
            }
        };

        window.goPage = (page) => {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("on"));
            document.getElementById(page === 'checkin' ? 'cPage' : 'aPage').classList.add("on");
        };

        window.startCheck = () => {
            document.getElementById("welcome").classList.add("hidden");
            document.getElementById("steps").style.display = "flex";
            goS(1);
        };

        window.goS = (step) => {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("on"));
            document.getElementById("s" + step).classList.add("on");
            // 단계별 UI 처리 로직
        };

        window.doCheck = async () => {
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            if(!name || !phone) return alert("입력 필수");
            
            // 데이터 저장 및 슬랙 발송 로직
            alert("체크인 완료!");
            goS(6);
            // 15초 뒤 초기화 로직 구현 가능
        };

        function render() {
            // 디자이너 및 음료 그리드 생성 로직
        }

        load();
    </script>
</body>
</html>
